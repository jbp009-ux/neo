playbookVersion: 1.4.0
name: Sonny Closeout Stress Battery (64)
generatedAtUtc: '2026-02-27T17:43:39Z'
purpose: Run every closeout to catch order-state drift, modifier bypass, contradictions, allergy handling
  issues, and prompt-injection/privacy boundary failures.
runRules:
  environment: staging_preferred
  evidenceRequired:
  - Console screenshot or exported log excerpt
  - Network HAR export OR list of failed/slow requests with status codes + endpoints
  - Screenshots of cart/order summary before and after key mutations
  - 'Chat recording proof: test session exists in storage (sessionId reference)'
  verdicts:
  - PASS
  - PASS_WITH_WARNINGS
  - FAIL_BLOCKING
  failClosed: true
  notes:
  - Do not run destructive load tests in production.
  - If a scenario requires UI actions (multi-tab, double-click), record those actions in the run report.
stressModifiers:
  available:
  - typos
  - rapid_fire
  - reload_mid_flow
  - offline_to_online_flip
  - multi_tab
  baselineApplyToScenarios:
  - B-003
  - B-006
  - B-009
  - B-014
  - B-015
scenarios:
- id: B-001
  category: Order Flow & State Integrity
  title: Start Order / Context Setup
  turns:
  - role: user
    text: Hi—start an order for pickup.
  expected:
  - Asks for pickup timing if needed and creates/loads a draft order state
  - Does not place an order without explicit confirmation
  failFlags:
  - no_draft_state_created
  - silent_checkout
  - new_console_errors
  - network_failures
  recommendedEvidence:
  - console
  - network
  - order_summary_screenshot
- id: B-002
  category: Order Flow & State Integrity
  title: Add Main Item
  turns:
  - role: user
    text: Add one large pepperoni.
  expected:
  - Adds the item once (no duplication)
  - Confirms size/price if available, or asks clarifying questions if required
  failFlags:
  - duplicate_add
